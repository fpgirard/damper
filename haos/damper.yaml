# 
external_components:
  - source: github://slimcdk/esphome-custom-components
    components: [tmc2209_hub, tmc2209, stepper]

substitutions:
  stepper_direction: "cw" # change to "cw" or "ccw" to change direction
  max_distance_steps: 380 # 10 steps from a full 90 degrees
  min_distance_steps: 20  # 0 steps from home

api:

ota:
  - platform: esphome

logger:

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

web_server:
  port: 80

esphome:
  name: damper
  on_boot:
    - tmc2209.configure:
        direction: cw
        microsteps: 8
        interpolation: true
        tcool_threshold: 600
        tpwm_threshold: 150
    - tmc2209.stallguard:
        threshold: 55
    - tmc2209.currents:
        standstill_mode: normal
        irun: 15 # 0-31. 31 = 2A current
        ihold: 0
        tpowerdown: 0
        iholddelay: 0
    - button.press: home # home right after boot

globals:
  - id: has_homed
    type: bool
    initial_value: "true"
    restore_value: no

uart:
  tx_pin: 6
  rx_pin: 5
  baud_rate: 500000

stepper:
  - platform: tmc2209
    id: driver
    max_speed: 2000 steps/s # Faster speed is louder
    acceleration: 2000 steps/s^2
    deceleration: 2000 steps/s^2
    config_dump_include_registers: true
    rsense: 100 mOhm
    vsense: False
    enn_pin: 8
    index_pin: 0
    diag_pin: 1
    on_stall:
      - logger.log: "Motor stalled!"
      - stepper.stop: driver
      - if:
          condition:
            lambda: return !id(has_homed);
          then:
            - stepper.report_position:
                id: driver
                position: 0
            - stepper.set_target:
                id: driver
                target: ${min_distance_steps}
            - globals.set:
                id: has_homed
                value: "true"
            - logger.log: "Home position set"

cover:
  - platform: template
    id: damper_cover
    device_class: damper
    has_position: true
    assumed_state: false
    lambda: "return 1.0 - (id(driver)->current_position / ${max_distance_steps});"
    name: Damper
    stop_action:
      - stepper.stop: driver
    close_action:
      - stepper.set_target:
          id: driver
          target: !lambda return ${max_distance_steps} ;
    open_action:
      - stepper.set_target:
          id: driver
          target: !lambda return ${min_distance_steps} ;

button:
  - platform: template
    name: Home
    id: home
    on_press:
      - logger.log: "Going home!"
      - globals.set:
          id: has_homed
          value: "false"
      - stepper.set_target:
          id: driver
          target: -200000

sensor:
  - platform: template
    name: "Position"
    id: my_position
    unit_of_measurement: steps
    lambda: return id(driver).current_position;
    update_interval: 1s

number:
  - platform: template
    name: Stepper Control
    id: stepper_control
    min_value: ${min_distance_steps}
    max_value: ${max_distance_steps}
    optimistic: true
    step: 1
    set_action:
      then:
        - stepper.set_target:
            id: driver
            target: !lambda 'return x;'
