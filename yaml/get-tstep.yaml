external_components:
  - source: github://slimcdk/esphome-custom-components
    components: [tmc2209_hub, tmc2209, stepper]

api:

ota:
  - platform: esphome

logger:

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

web_server:
  port: 80

esphome:
  name: damper
  on_boot:
    - tmc2209.configure:
        direction: cw
        microsteps: 8
        interpolation: true
        tcool_threshold: 600
        tpwm_threshold: 150
    - tmc2209.currents:
        standstill_mode: normal
        irun: 15 # 0-31. 31 = 2A current
        ihold: 0
        tpowerdown: 0
        iholddelay: 0
    - button.press: home # home right after boot

uart:
  tx_pin: 6
  rx_pin: 5
  baud_rate: 500000

stepper:
  - platform: tmc2209
    id: driver
    max_speed: 2000 steps/s # Faster speed is louder
    acceleration: 2000 steps/s^2
    deceleration: 2000 steps/s^2
    config_dump_include_registers: true
    rsense: 100 mOhm
    vsense: False
    enn_pin: 8
    index_pin: 0
    diag_pin: 1

sensor:
  - platform: template
    name: TSET result
    update_interval: 250ms
    lambda: return id(driver)->read_register(TSTEP);

button:
  - platform: template
    name: Home
    id: home
    on_press:
      - logger.log: "Getting TSTEP!"
      # 2000/0.715256 = ~2800
      - lambda: id(driver)->write_register(VACTUAL, -2800);
