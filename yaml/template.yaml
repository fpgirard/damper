- sensor:
    - name: "Delta Temperature"
      unique_id: delta_temperature
      unit_of_measurement: "°F"
      state_class: measurement
      device_class: temperature
      state: >
        {% set t1 = states('sensor.upstairs_current_temperature') | float(0) %}
#        {% set t2 = states('sensor.upstairs_remote_temperature') | float(0) %}
        {% set t2 = [
          states('sensor.upstairs_remote_temperature') | float(0),
          states('sensor.presence_multi_sensor_fp300_temperature') | float(0)
        ] | min %}        
        {% set mode = states('climate.upstairs') %}
        {% if mode == 'heat' %}
          {{ (t1 - t2) | round(1) }}
        {% elif mode == 'cool' %}
          {{ (t2 - t1) | round(1) }}
        {% else %}
          0  # no difference in temperature
        {% endif %}
